name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      # 方法二：临时注释 gradle.properties 中的 org.gradle.java.home 行
      # 同时通过 -D 参数显式指定正确的 JAVA_HOME
      - name: Build APK (override java.home)
        run: |
          # 备份并注释掉可能存在的错误 java.home 配置
          if [ -f gradle.properties ]; then
            sed -i 's/^org.gradle.java.home=/# &/' gradle.properties || true
          fi
          # 使用 -D 参数显式指定正确的 JAVA_HOME
          gradle assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
