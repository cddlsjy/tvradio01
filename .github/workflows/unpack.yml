name: Unpack ZIP and Move Subdir to Root

on:
  push:
    paths: ['**.zip']          # 推送 zip 文件时自动触发
  workflow_dispatch:           # 也支持手动触发
    inputs:
      zip_file:
        description: '要解压的 ZIP 文件名（例如 "archive.zip"）'
        required: false
        default: ''
      subdir:
        description: '要移动到根目录的子目录名（可选，独立于 ZIP）'
        required: false
        default: ''

jobs:
  unpack-and-move:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 1️⃣ 自动解压（仅当恰好有一个 zip 文件）
      - name: 自动解压并移动子目录内容
        if: github.event_name == 'push'
        run: |
          shopt -s dotglob
          zip_files=(*.zip)
          count=${#zip_files[@]}

          if [ $count -eq 0 ]; then
            echo "没有找到 ZIP 文件"
            exit 0
          elif [ $count -eq 1 ]; then
            zipfile="${zip_files[0]}"
            echo "自动解压: $zipfile"
            temp_dir="${zipfile%.zip}_temp_$$"
            mkdir -p "$temp_dir"
            unzip -o "$zipfile" -d "$temp_dir"

            # 检查解压后是否为空
            if [ -z "$(ls -A "$temp_dir")" ]; then
              echo "⚠️ ZIP 文件为空"
              rm -rf "$temp_dir"
              rm -f "$zipfile"
              exit 0
            fi

            items=("$temp_dir"/*)
            if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
              subdir="${items[0]}"
              echo "检测到单一顶层子目录: $subdir，将其内容移动到根目录"
              cp -rf "$subdir"/. .
              rm -rf "$subdir"
            else
              echo "ZIP 内没有单一顶层目录，直接移动所有内容"
              cp -rf "$temp_dir"/. .
            fi

            rm -rf "$temp_dir"
            rm -f "$zipfile"
            echo "✅ 解压并移动完成"
          else
            echo "检测到多个 ZIP 文件 ($count 个)，不自动解压。"
            echo "请手动运行 workflow_dispatch 并指定 zip_file。"
            printf '  - %s\n' "${zip_files[@]}"
            exit 0
          fi

      # 2️⃣ 手动解压指定的 ZIP 文件
      - name: 手动解压并移动子目录内容
        if: github.event_name == 'workflow_dispatch' && inputs.zip_file != ''
        run: |
          shopt -s dotglob
          zipfile="${{ inputs.zip_file }}"
          if [ ! -f "$zipfile" ]; then
            echo "❌ 文件 '$zipfile' 不存在"
            ls -1 *.zip 2>/dev/null || echo "（当前目录无 zip 文件）"
            exit 1
          fi
          echo "手动解压: $zipfile"
          temp_dir="${zipfile%.zip}_temp_$$"
          mkdir -p "$temp_dir"
          unzip -o "$zipfile" -d "$temp_dir"

          items=("$temp_dir"/*)
          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            subdir="${items[0]}"
            echo "检测到单一顶层子目录: $subdir，将其内容移动到根目录"
            cp -rf "$subdir"/. .
            rm -rf "$subdir"
          else
            echo "ZIP 内没有单一顶层目录，直接移动所有内容"
            cp -rf "$temp_dir"/. .
          fi

          rm -rf "$temp_dir"
          rm -f "$zipfile"
          echo "✅ 解压并移动完成"

      # 3️⃣ 手动移动已存在的子目录到根目录（独立于 ZIP）
      - name: 移动指定的子目录到根目录
        if: github.event_name == 'workflow_dispatch' && inputs.subdir != ''
        run: |
          shopt -s dotglob
          SUBDIR="${{ inputs.subdir }}"
          if [ -d "$SUBDIR" ]; then
            echo "移动子目录 '$SUBDIR' 的内容到根目录"
            cp -rf "$SUBDIR"/. .
            rm -rf "$SUBDIR"
            echo "✅ 子目录已提升到根目录"
          else
            echo "❌ 子目录 '$SUBDIR' 不存在"
            exit 1
          fi

      # 4️⃣ 提交更改（排除 .github 目录，避免触发循环）
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add . -- ':!.github'
          git diff --staged --quiet || git commit -m "解压 ZIP 并整理目录结构"
          git push